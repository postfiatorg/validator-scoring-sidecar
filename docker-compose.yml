services:
  sidecar:
    # Published per-environment verify-only image; the tag follows the network
    # set in .env. Participation deployments layer docker-compose.participate.yml
    # on top. Developers building from source: see README.md.
    image: agtipft/validator-scoring-sidecar:${POSTFIAT_SIDECAR_NETWORK:-testnet}-latest
    container_name: validator-scoring-sidecar
    init: true
    restart: unless-stopped
    # .env is created from .env.testnet.example or .env.devnet.example.
    env_file:
      - .env
    environment:
      # Pinned to the mounted volume; overrides any host-style path in .env.
      POSTFIAT_SIDECAR_DATA_DIR: /data
    volumes:
      - sidecar_data:/data

volumes:
  sidecar_data:
