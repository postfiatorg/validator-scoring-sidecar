name: ci

on:
  push:
    branches: [main, devnet, testnet]
  pull_request:
    branches: [main, devnet, testnet]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out sidecar
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sidecar package with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out sidecar
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: python -m pip install "ruff>=0.15,<1"

      - name: Run ruff
        run: ruff check .

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out sidecar
        uses: actions/checkout@v4

      # The participation target is deliberately not built here: it pulls the
      # multi-gigabyte postfiatd image to extract the validator-keys tool and
      # is gate-checked where it is published instead.
      - name: Build verify-only image
        run: docker build --target runtime .
