name: vendor-freshness

on:
  push:
    branches: [main, devnet, testnet]
  pull_request:
    branches: [main, devnet, testnet]
  workflow_dispatch:
    inputs:
      branch:
        description: "Foundation branch to check against"
        required: true
        type: choice
        options:
          - main
          - devnet
          - testnet
        default: main

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out sidecar
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sidecar package
        run: python -m pip install -e .

      - name: Resolve target branch and mode
        id: target
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            branch="${{ github.base_ref }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            branch="${{ inputs.branch }}"
          else
            branch="${{ github.ref_name }}"
          fi

          if [[ "$branch" == "main" ]]; then
            mode="warning"
          else
            mode="blocking"
          fi

          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "Checking foundation branch '$branch' in mode '$mode'"

      - name: Run vendor-freshness check
        run: |
          python scripts/check_vendor_freshness.py \
            --branch "${{ steps.target.outputs.branch }}" \
            --mode "${{ steps.target.outputs.mode }}"
