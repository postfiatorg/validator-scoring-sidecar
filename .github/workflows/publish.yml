name: publish

# Pushing to an environment branch publishes that environment's operator images:
# the verify-only image and the participation image whose postfiatd
# `validator-keys` signing tool comes from the same environment's published
# postfiatd image and is executed during the build (the Dockerfile gate), so an
# incompatible signing tool fails the publish, never a round on the ledger.
on:
  push:
    branches: [devnet, testnet]
  workflow_dispatch:

env:
  IMAGE_NAME: agtipft/validator-scoring-sidecar

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out sidecar
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sidecar package with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest

  vendor-freshness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out sidecar
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sidecar package
        run: python -m pip install -e .

      # Blocking by design: an image whose vendored scoring modules drifted
      # from the foundation's same-named branch must never be published.
      - name: Run vendor-freshness check (blocking)
        run: |
          python scripts/check_vendor_freshness.py \
            --branch "${{ github.ref_name }}" \
            --mode blocking

  publish:
    needs: [test, vendor-freshness]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out sidecar
        uses: actions/checkout@v4

      - name: Resolve environment and immutable tag
        id: meta
        run: |
          case "${{ github.ref_name }}" in
            devnet|testnet) ;;
            *)
              echo "publish only runs from devnet or testnet, got '${{ github.ref_name }}'" >&2
              exit 1
              ;;
          esac
          echo "env=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push verify-only image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.env }}-latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.env }}-${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=verify
          cache-to: type=gha,mode=max,scope=verify

      # `pull: true` re-resolves the mutable postfiatd source tag and
      # `no-cache-filters` forces the participate stage — including its
      # `validator-keys --version` gate — to re-execute every publish. Without
      # both, a cached layer could ship a never-re-verified signing tool after
      # postfiatd updates the tag in place.
      - name: Build and push participation image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: participate
          platforms: linux/amd64
          push: true
          pull: true
          no-cache-filters: participate
          build-args: |
            VALIDATOR_KEYS_IMAGE=agtipft/postfiatd:${{ steps.meta.outputs.env }}-light-latest
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.env }}-participate-latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.env }}-participate-${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=participate
          cache-to: type=gha,mode=max,scope=participate
