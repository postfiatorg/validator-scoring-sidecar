name: publish

# Pushing to an environment branch publishes that environment's operator images:
# the verify-only image and the participation image whose postfiatd
# `validator-keys` signing tool comes from the same environment's published
# postfiatd image and is executed during the build (the Dockerfile gate), so an
# incompatible signing tool fails the publish, never a round on the ledger.
on:
  push:
    branches: [devnet, testnet]
  workflow_dispatch:

env:
  IMAGE_NAME: agtipft/validator-scoring-sidecar

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out sidecar
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sidecar package with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest

  vendor-freshness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out sidecar
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sidecar package
        run: python -m pip install -e .

      # Blocking by design: an image whose vendored scoring modules drifted
      # from the foundation's same-named branch must never be published.
      - name: Run vendor-freshness check (blocking)
        run: |
          python scripts/check_vendor_freshness.py \
            --branch "${{ github.ref_name }}" \
            --mode blocking

  publish:
    needs: [test, vendor-freshness]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out sidecar
        uses: actions/checkout@v4

      - name: Resolve environment, version, and immutable tag
        id: meta
        run: |
          case "${{ github.ref_name }}" in
            devnet|testnet) ;;
            *)
              echo "publish only runs from devnet or testnet, got '${{ github.ref_name }}'" >&2
              exit 1
              ;;
          esac
          VERSION=$(grep -m1 -oP '^version\s*=\s*"\K[^"]+' pyproject.toml)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract version from pyproject.toml"
            exit 1
          fi
          echo "env=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      # The version tag is immutable: a build that reuses an already-published
      # version would silently ship different bytes under the same name. Refuse
      # to publish until pyproject.toml is bumped, and fail safe (do not publish)
      # if the registry cannot be queried. Both images share one version and the
      # verify-only image is pushed first, so its tag is the single gate. Trade-off
      # of one shared gate: if the participate build fails after verify-only pushed,
      # re-publishing needs a version bump (the verify tag already exists), so that
      # version keeps a verify image with no participate counterpart.
      - name: Refuse to overwrite an existing version tag
        run: |
          TAG="${{ steps.meta.outputs.env }}-${{ steps.meta.outputs.version }}"
          echo "Checking Docker Hub for tag '$TAG'..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/$TAG")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "::error::Tag '$TAG' already exists. Bump 'version' in pyproject.toml."
            exit 1
          elif [ "$HTTP_STATUS" != "404" ]; then
            echo "::error::Docker Hub API returned HTTP $HTTP_STATUS. Failing safe."
            exit 1
          fi
          echo "Tag does not exist. Proceeding."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push verify-only image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.env }}-latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.env }}-${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.env }}-${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=verify
          cache-to: type=gha,mode=max,scope=verify

      # `pull: true` re-resolves the mutable postfiatd source tag and
      # `no-cache-filters` forces the participate stage — including its
      # `validator-keys --version` gate — to re-execute every publish. Without
      # both, a cached layer could ship a never-re-verified signing tool after
      # postfiatd updates the tag in place.
      - name: Build and push participation image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: participate
          platforms: linux/amd64
          push: true
          pull: true
          no-cache-filters: participate
          build-args: |
            VALIDATOR_KEYS_IMAGE=agtipft/postfiatd:${{ steps.meta.outputs.env }}-light-latest
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.env }}-participate-latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.env }}-participate-${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.env }}-participate-${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=participate
          cache-to: type=gha,mode=max,scope=participate
